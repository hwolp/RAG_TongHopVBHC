<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="980" viewBox="0 0 1500 980" role="img" aria-labelledby="title desc">
  <title id="title">Mô hình kiến trúc vật lý hệ thống RAG Tổng hợp văn bản hành chính</title>
  <desc id="desc">Sơ đồ triển khai vật lý gồm thiết bị người dùng, mạng Internet hoặc LAN, máy chủ ứng dụng, máy chủ xử lý RAG, cơ sở dữ liệu MySQL, kho vector ChromaDB, kho tệp và dịch vụ AI Ollama.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#344054"/>
    </marker>
    <marker id="dashArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#667085"/>
    </marker>
    <style>
      .title { font: 700 30px "Times New Roman", serif; fill: #111827; }
      .subtitle { font: 400 22px "Times New Roman", serif; fill: #111827; }
      .caption { font: italic 28px "Times New Roman", serif; fill: #111827; }
      .note { font: 400 20px "Times New Roman", serif; fill: #111827; }
      .label { font: 700 16px Arial, sans-serif; fill: #172033; }
      .small { font: 400 13px Arial, sans-serif; fill: #344054; }
      .tiny { font: 400 12px Arial, sans-serif; fill: #475467; }
      .cloudText { font: 700 13px Arial, sans-serif; fill: #344054; }
      .boundary { fill: #ffffff; stroke: #98a2b3; stroke-width: 1.6; stroke-dasharray: 4 5; }
      .box { fill: #ffffff; stroke: #667085; stroke-width: 1.8; rx: 12; }
      .boxBlue { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.8; rx: 12; }
      .boxGreen { fill: #ecfdf3; stroke: #16a34a; stroke-width: 1.8; rx: 12; }
      .boxAmber { fill: #fff7ed; stroke: #f97316; stroke-width: 1.8; rx: 12; }
      .boxRose { fill: #fff1f2; stroke: #e11d48; stroke-width: 1.8; rx: 12; }
      .boxViolet { fill: #eef2ff; stroke: #4f46e5; stroke-width: 1.8; rx: 12; }
      .externalCloud { fill: #fff3c4; stroke: #f3d37b; stroke-width: 1.2; stroke-dasharray: 4 5; }
      .line { fill: none; stroke: #344054; stroke-width: 2.2; marker-end: url(#arrow); }
      .lineBoth { fill: none; stroke: #344054; stroke-width: 2.2; marker-start: url(#arrow); marker-end: url(#arrow); }
      .dash { fill: none; stroke: #667085; stroke-width: 2; stroke-dasharray: 7 6; marker-end: url(#dashArrow); }
      .dashBoth { fill: none; stroke: #667085; stroke-width: 2; stroke-dasharray: 7 6; marker-start: url(#dashArrow); marker-end: url(#dashArrow); }
      .icon { fill: none; stroke: #172033; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
      .serverLine { stroke: #0284c7; stroke-width: 3; stroke-linecap: round; }
      .db { fill: #ffffff; stroke: #344054; stroke-width: 2; }
    </style>
  </defs>

  <rect x="0" y="0" width="1500" height="980" fill="#ffffff"/>

  <text class="title" x="72" y="54">2. Mô hình kiến trúc vật lý</text>
  <text class="subtitle" x="72" y="102">Trên cơ sở kiến trúc ứng dụng và công nghệ đã lựa chọn, mô hình triển khai vật lý của hệ thống</text>
  <text class="subtitle" x="72" y="134">RAG Tổng hợp văn bản hành chính được đề xuất như sau:</text>

  <!-- User devices -->
  <rect class="boundary" x="365" y="180" width="270" height="135" rx="24"/>
  <circle class="icon" cx="546" cy="207" r="10"/>
  <path class="icon" d="M546 217v30M527 231h38M536 247l-12 22M556 247l12 22"/>
  <rect class="icon" x="417" y="238" width="43" height="30"/>
  <rect class="icon" x="446" y="253" width="32" height="24"/>
  <rect class="icon" x="393" y="250" width="31" height="23"/>
  <text class="label" x="548" y="260" text-anchor="middle">Thiết bị đầu cuối</text>
  <text class="small" x="548" y="281" text-anchor="middle">Admin / quản lý / nhân viên</text>

  <!-- Network cloud -->
  <path class="boundary" d="M645 397
    C662 356 704 333 753 348
    C781 301 846 284 901 316
    C943 281 1015 288 1049 333
    C1110 327 1158 366 1153 423
    C1200 443 1207 508 1161 539
    C1165 599 1103 632 1044 611
    C1006 650 936 657 894 618
    C840 645 778 625 757 577
    C705 593 650 564 647 512
    C594 491 591 424 645 397 Z"/>
  <text class="cloudText" x="888" y="370" text-anchor="middle">TRUNG TÂM DỮ LIỆU / MÁY CHỦ TRIỂN KHAI</text>
  <text class="tiny" x="704" y="573">LAN / CLOUD</text>

  <!-- Main ingress -->
  <rect class="boxBlue" x="760" y="405" width="260" height="78"/>
  <text class="label" x="890" y="434" text-anchor="middle">Web server / Reverse proxy</text>
  <text class="small" x="890" y="458" text-anchor="middle">Nginx hoặc Vite dev server</text>

  <!-- App servers -->
  <rect class="boxGreen" x="690" y="525" width="235" height="100"/>
  <text class="label" x="807" y="555" text-anchor="middle">Server ứng dụng</text>
  <text class="small" x="807" y="580" text-anchor="middle">FastAPI Backend</text>
  <text class="tiny" x="807" y="602" text-anchor="middle">REST API, xác thực JWT, RBAC</text>

  <rect class="boxAmber" x="970" y="525" width="235" height="100"/>
  <text class="label" x="1087" y="555" text-anchor="middle">Server xử lý nền</text>
  <text class="small" x="1087" y="580" text-anchor="middle">Job worker, OCR, index tài liệu</text>
  <text class="tiny" x="1087" y="602" text-anchor="middle">Tesseract, embedding pipeline</text>

  <!-- Data stores -->
  <rect class="boxViolet" x="545" y="710" width="215" height="92"/>
  <text class="label" x="652" y="739" text-anchor="middle">CSDL nghiệp vụ</text>
  <text class="small" x="652" y="763" text-anchor="middle">MySQL 8.0 - rag_db</text>
  <text class="tiny" x="652" y="785" text-anchor="middle">người dùng, tài liệu, phiên chat</text>

  <rect class="boxViolet" x="805" y="710" width="215" height="92"/>
  <text class="label" x="912" y="739" text-anchor="middle">Kho vector</text>
  <text class="small" x="912" y="763" text-anchor="middle">ChromaDB storage</text>
  <text class="tiny" x="912" y="785" text-anchor="middle">embedding và chỉ mục RAG</text>

  <rect class="boxViolet" x="1065" y="710" width="215" height="92"/>
  <text class="label" x="1172" y="739" text-anchor="middle">Kho tệp tài liệu</text>
  <text class="small" x="1172" y="763" text-anchor="middle">uploads/ personal, department, SQP</text>
  <text class="tiny" x="1172" y="785" text-anchor="middle">PDF, DOCX, ảnh scan</text>

  <!-- AI server -->
  <rect class="boxRose" x="1260" y="490" width="205" height="120"/>
  <text class="label" x="1362" y="521" text-anchor="middle">Server AI nội bộ</text>
  <text class="small" x="1362" y="547" text-anchor="middle">Ollama</text>
  <text class="tiny" x="1362" y="570" text-anchor="middle">qwen2.5:3b-instruct</text>
  <text class="tiny" x="1362" y="591" text-anchor="middle">Sinh câu trả lời RAG</text>

  <!-- External systems cloud -->
  <path class="externalCloud" d="M1182 236
    C1205 207 1264 203 1299 224
    C1335 197 1404 211 1411 253
    C1455 270 1451 320 1407 334
    C1388 370 1318 372 1286 348
    C1240 372 1173 354 1174 313
    C1134 291 1142 251 1182 236 Z"/>
  <text class="label" x="1300" y="288" text-anchor="middle">Hệ thống ngoài</text>
  <text class="small" x="1300" y="312" text-anchor="middle">SSO, thư mục người dùng, API tích hợp</text>

  <!-- Simple server icons -->
  <g transform="translate(785 421)">
    <rect class="icon" x="0" y="0" width="46" height="10"/>
    <rect class="icon" x="0" y="16" width="46" height="10"/>
    <rect class="icon" x="0" y="32" width="46" height="10"/>
    <line class="serverLine" x1="8" y1="5" x2="22" y2="5"/>
    <line class="serverLine" x1="8" y1="21" x2="22" y2="21"/>
    <line class="serverLine" x1="8" y1="37" x2="22" y2="37"/>
  </g>
  <g transform="translate(710 548)">
    <rect class="icon" x="0" y="0" width="50" height="12"/>
    <rect class="icon" x="0" y="19" width="50" height="12"/>
    <rect class="icon" x="0" y="38" width="50" height="12"/>
    <line class="serverLine" x1="9" y1="6" x2="25" y2="6"/>
    <line class="serverLine" x1="9" y1="25" x2="25" y2="25"/>
    <line class="serverLine" x1="9" y1="44" x2="25" y2="44"/>
  </g>
  <g transform="translate(990 548)">
    <rect class="icon" x="0" y="0" width="50" height="12"/>
    <rect class="icon" x="0" y="19" width="50" height="12"/>
    <rect class="icon" x="0" y="38" width="50" height="12"/>
    <line class="serverLine" x1="9" y1="6" x2="25" y2="6"/>
    <line class="serverLine" x1="9" y1="25" x2="25" y2="25"/>
    <line class="serverLine" x1="9" y1="44" x2="25" y2="44"/>
  </g>
  <g transform="translate(570 732)">
    <ellipse class="db" cx="25" cy="8" rx="25" ry="8"/>
    <path class="db" d="M0 8v44c0 5 11 9 25 9s25-4 25-9V8"/>
    <path class="db" d="M0 30c0 5 11 9 25 9s25-4 25-9"/>
  </g>
  <g transform="translate(830 732)">
    <ellipse class="db" cx="25" cy="8" rx="25" ry="8"/>
    <path class="db" d="M0 8v44c0 5 11 9 25 9s25-4 25-9V8"/>
    <path class="db" d="M0 30c0 5 11 9 25 9s25-4 25-9"/>
  </g>
  <g transform="translate(1090 731)">
    <path class="icon" d="M2 18h20l7 9h45v46H2z"/>
    <path class="icon" d="M2 27h72"/>
  </g>

  <!-- Connections -->
  <line class="lineBoth" x1="500" y1="315" x2="760" y2="420"/>
  <text class="small" x="565" y="365" text-anchor="middle">HTTPS</text>

  <line class="lineBoth" x1="890" y1="483" x2="890" y2="525"/>
  <text class="small" x="932" y="510">REST API</text>

  <line class="lineBoth" x1="925" y1="575" x2="970" y2="575"/>
  <text class="small" x="948" y="562" text-anchor="middle">Job</text>

  <path class="lineBoth" d="M755 625 C720 652 690 680 660 710"/>
  <path class="lineBoth" d="M825 625 C855 655 890 680 910 710"/>
  <path class="lineBoth" d="M1045 625 C1090 655 1140 678 1168 710"/>

  <path class="dashBoth" d="M1205 575 C1230 568 1245 560 1260 550"/>
  <text class="small" x="1242" y="533" text-anchor="middle">RAG inference</text>

  <path class="dashBoth" d="M1090 525 C1135 427 1205 363 1266 337"/>
  <text class="small" x="1185" y="430" text-anchor="middle">SSO / đồng bộ danh mục</text>

  <path class="dash" d="M1055 710 C1038 675 1025 650 1005 625"/>
  <text class="small" x="1055" y="675" text-anchor="middle">OCR, tách chunk</text>

  <!-- Footer caption -->
  <text class="caption" x="750" y="890" text-anchor="middle">Hình 12. Mô hình kiến trúc vật lý của hệ thống RAG Tổng hợp văn bản hành chính</text>
  <text class="note" x="72" y="935">Hệ thống cung cấp các API để giao diện web, dịch vụ nội bộ và các hệ thống khác có thể truy cập, tích hợp dữ liệu theo phân quyền.</text>
</svg>
